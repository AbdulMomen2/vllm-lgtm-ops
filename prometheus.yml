global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'gpu-exporter'
    static_configs:
      - targets: ['gpu-exporter:9400']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8001']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'llm-engine'
    static_configs:
      - targets: ['llm-engine:8000']